<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="./brand/para3-mark.svg">
<link rel="apple-touch-icon" href="./brand/para3-icon-maskable.svg">
<title>PARA·3</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
/* dynamic viewport units: respect the browser chrome AND the safe area; never
   100vh (which lies on mobile when the URL bar appears/disappears). */
body{
  display:flex;justify-content:center;background:#000;font-family:'Chakra Petch',sans-serif;
  min-height:100svh;min-height:100dvh;
  overscroll-behavior:none;touch-action:manipulation;
}

.app{
  width:100%;max-width:440px;height:100svh;height:100dvh;
  position:relative;
  display:flex;flex-direction:column;
  /* U6 — theme-aware lift-off colours. Dark theme: cold drop shadow on the
     near-black body. Bone theme: warm tobacco-tinted shadow so the cream
     card doesn't look stamped onto pure black. The shadow values themselves
     live in the tablet+ media-queries (no shadow on mobile portrait). */
  --app-shadow:0,0,0;
  --app-edge:rgba(255,255,255,.04);
  --bg1:#1b1c23;--bg2:#0a0a0c;--bg3:#060608;
  --card1:#23242b;--card2:#15161c;
  --metal1:#46484f;--metal2:#1d1e24;--metal3:#0f1014;
  --accent:#ff6a18;--accent2:#ff8a3d;--accent-dim:#7a3c12;
  --ink:#cdd0d9;--ink-dim:#7d8090;--line:#000;
  --keyw1:#dad9d4;--keyw2:#a9a8a2;--grain:overlay;--gop:.05;
  --soft:0 6px 16px -10px #000;
  background:radial-gradient(120% 60% at 50% 0%,var(--bg1),var(--bg2) 55%,var(--bg3));
  color:var(--ink);transition:background .4s,color .4s}
.app[data-theme="bone"]{
  --bg1:#f2ece0;--bg2:#e4dccb;--bg3:#d8cfb9;
  --card1:#efe8d8;--card2:#e0d7c2;
  --metal1:#fbf6ea;--metal2:#cdc2a8;--metal3:#a99c7e;
  --accent:#cf4a14;--accent2:#e7702e;--accent-dim:#b07a4e;
  --ink:#2c271f;--ink-dim:#897e66;--line:#bdb39a;
  --keyw1:#fcfaf3;--keyw2:#d8cfba;--grain:multiply;--gop:.04;
  --soft:0 6px 16px -12px rgba(80,60,30,.5);
  /* Warm tobacco shadow + parchment highlight for the bone-on-black card. */
  --app-shadow:60,40,20;
  --app-edge:rgba(255,238,210,.22);
  background:radial-gradient(120% 60% at 50% 0%,var(--bg1),var(--bg2) 55%,var(--bg3))}
.app::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:999;
  opacity:var(--gop);mix-blend-mode:var(--grain);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>")}

.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:calc(13px + env(safe-area-inset-top)) 16px 11px;
  background:linear-gradient(180deg,var(--bg1),transparent);backdrop-filter:blur(2px)}
.logo{font-size:21px;font-weight:700;letter-spacing:3px;color:var(--ink)}
.logo b{color:var(--accent);text-shadow:0 0 12px color-mix(in srgb,var(--accent) 60%,transparent)}
.themes{display:flex;gap:5px;background:var(--card2);padding:4px;border-radius:9px;
  box-shadow:0 0 0 1px var(--line) inset}
.themes button{font-family:'Chakra Petch';font-size:9px;font-weight:700;letter-spacing:1.5px;
  border:none;border-radius:6px;padding:6px 9px;color:var(--ink-dim);background:transparent;cursor:pointer;transition:.2s}
.themes button.on{color:#fff;background:var(--accent);
  box-shadow:0 0 12px color-mix(in srgb,var(--accent) 55%,transparent)}

.patch{display:flex;gap:6px;padding:0 14px 11px;overflow-x:auto;scrollbar-width:none}
.patch::-webkit-scrollbar{display:none}
.pslot{flex:0 0 auto;width:42px;height:36px;border:none;border-radius:8px;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-dim);
  background:linear-gradient(180deg,var(--card1),var(--card2));
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset,var(--soft);transition:.15s;position:relative}
.pslot.filled{color:var(--ink)}
.pslot.filled::after{content:"";position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 5px var(--accent)}
.pslot.active{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent));
  box-shadow:0 0 14px color-mix(in srgb,var(--accent) 55%,transparent)}
.psave{flex:0 0 auto;width:54px;height:36px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Chakra Petch';font-size:10px;font-weight:700;letter-spacing:1px;color:var(--ink-dim);
  background:linear-gradient(180deg,var(--card1),var(--card2));box-shadow:var(--soft)}
.psave.arm{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent))}

.disp{margin:0 14px 12px;border-radius:12px;padding:12px 16px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0c0905,#070503);
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 8px 18px -10px #000 inset}
.app[data-theme="bone"] .disp{background:linear-gradient(180deg,#1c130a,#0d0805)}
.disp::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.32) 0 1px,transparent 1px 3px)}
.dRow{display:flex;justify-content:space-between;align-items:flex-end;z-index:1;position:relative}
.dParam{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:#8a4a1e;text-transform:uppercase}
.dVal{font-family:'DM Mono',monospace;font-size:32px;color:#ffb066;
  text-shadow:0 0 16px rgba(255,150,70,.5);line-height:1}
.dUnit{font-size:12px;color:#8a4a1e;margin-left:5px}
#scope{width:100%;height:40px;display:block;margin-top:7px;position:relative;z-index:1}

/* .scroll is the ONLY scrollable region. Fixed top (bar/patch/disp) and fixed
   bottom (.kbd) live above/below it in the flex column. The mask uses two CSS
   variables (--mtop / --mbot) updated by JS on scroll: a soft 24 px fade only
   appears at an edge if there is more content to reveal in that direction.
   Variante 2 aus der Diskussion. */
.scroll{
  flex:1; min-height:0;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  padding:0 14px 12px;
  scrollbar-width:none;
  --mtop:0; --mbot:1;
  -webkit-mask-image: linear-gradient(to bottom,
    transparent 0,
    #000 calc(var(--mtop) * 24px),
    #000 calc(100% - var(--mbot) * 24px),
    transparent 100%);
          mask-image: linear-gradient(to bottom,
    transparent 0,
    #000 calc(var(--mtop) * 24px),
    #000 calc(100% - var(--mbot) * 24px),
    transparent 100%);
}
.scroll::-webkit-scrollbar{display:none}
.sec{background:linear-gradient(180deg,var(--card1),var(--card2));border-radius:14px;
  padding:13px 14px 15px;margin-bottom:12px;
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset,var(--soft)}
.sec h2{font-size:10px;letter-spacing:3px;color:var(--ink-dim);text-transform:uppercase;font-weight:600;
  margin-bottom:13px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.sec h2 b{color:var(--accent)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;justify-items:center}

.knob{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;user-select:none;touch-action:none}
.dial{position:relative;width:60px;height:60px}
.dial svg{position:absolute;inset:0;transform:rotate(135deg)}
.trk{fill:none;stroke:rgba(0,0,0,.5);stroke-width:4;stroke-linecap:round}
.app[data-theme="bone"] .trk{stroke:rgba(120,100,60,.35)}
.flx{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;
  filter:drop-shadow(0 0 4px color-mix(in srgb,var(--accent) 70%,transparent))}
.cap{position:absolute;inset:9px;border-radius:50%;
  background:radial-gradient(circle at 38% 30%,var(--metal1),var(--metal2) 48%,var(--metal3));
  box-shadow:0 3px 6px -2px rgba(0,0,0,.6),0 0 0 1px var(--line),0 1px 0 rgba(255,255,255,.08) inset}
.ind{position:absolute;left:50%;top:8px;width:3px;height:13px;border-radius:2px;background:var(--accent);
  transform:translateX(-50%);transform-origin:50% 22px;
  box-shadow:0 0 7px 1px color-mix(in srgb,var(--accent) 80%,transparent)}
.knob label{font-size:9px;letter-spacing:1px;color:var(--ink-dim);text-transform:uppercase;font-weight:500;text-align:center}
/* U5 — motion-target indicator. Subtler than the original 2px solid cap
   ring: a 1px outline + soft glow on the whole control (knob OR fader), so
   any motion-fähig target reads as "armed" without the plump halo. Only
   visible while motionArm is true (set/cleared by setTarget / mArm). */
.knob.tgt,.fader.tgt{
  outline:1px solid color-mix(in srgb,var(--accent) 65%,transparent);
  outline-offset:3px;
  border-radius:8px;
  box-shadow:0 0 14px -3px color-mix(in srgb,var(--accent) 45%,transparent)}
/* inert controls (no engine path; UI feedback only) — subtle visual cue */
.knob.inert .cap{opacity:.6}

.fwrap{display:flex;justify-content:space-around;padding-top:2px}
.fader{display:flex;flex-direction:column;align-items:center;gap:8px;user-select:none;touch-action:none}
.slot{position:relative;width:16px;height:116px;border-radius:8px;cursor:ns-resize;
  background:linear-gradient(180deg,#0a0b0e,#1a1b21);
  box-shadow:0 0 0 1px var(--line) inset,0 2px 4px rgba(0,0,0,.4) inset}
.app[data-theme="bone"] .slot{background:linear-gradient(180deg,#bcb094,#d6ccb2)}
.sfill{position:absolute;left:50%;bottom:9px;width:3px;transform:translateX(-50%);
  background:var(--accent);border-radius:2px;box-shadow:0 0 6px color-mix(in srgb,var(--accent) 70%,transparent)}
.grip{position:absolute;left:50%;width:34px;height:20px;border-radius:5px;transform:translate(-50%,50%);
  background:linear-gradient(180deg,var(--metal1),var(--metal2) 60%,var(--metal3));
  box-shadow:0 2px 5px -1px rgba(0,0,0,.6),0 0 0 1px var(--line),0 1px 0 rgba(255,255,255,.15) inset}
.grip::after{content:"";position:absolute;left:6px;right:6px;top:50%;height:2px;transform:translateY(-50%);
  background:var(--accent);border-radius:2px}
.fader label{font-size:9px;letter-spacing:1px;color:var(--ink-dim);text-transform:uppercase}

.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.vgrid button{font-family:'Chakra Petch';font-size:9px;font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;color:var(--ink-dim);border:none;border-radius:7px;padding:11px 2px;cursor:pointer;
  background:linear-gradient(180deg,var(--card1),var(--card2));
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset,var(--soft);transition:.15s}
.vgrid button.on{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent));
  box-shadow:0 0 14px color-mix(in srgb,var(--accent) 55%,transparent)}
.wave{display:flex;gap:7px;justify-content:center;margin-top:13px;align-items:center}
.wave button{width:44px;height:34px;border:none;border-radius:7px;cursor:pointer;
  background:linear-gradient(180deg,var(--card1),var(--card2));color:var(--ink-dim);box-shadow:var(--soft);
  display:flex;align-items:center;justify-content:center}
.wave button svg{width:24px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.wave button.on{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent))}
.lled{width:12px;height:12px;border-radius:50%;background:var(--accent-dim);margin-left:6px;
  box-shadow:0 0 0 1px var(--line)}

.seqhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.seqhead h2{margin:0;border:0;padding:0;font-size:10px;letter-spacing:3px;color:var(--ink-dim);
  text-transform:uppercase;font-weight:600}
.seqhead h2 b{color:var(--accent)}
.tg{display:flex;gap:7px}
.tbtn{font-family:'Chakra Petch';font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--ink);border:none;padding:9px 13px;border-radius:8px;
  background:linear-gradient(180deg,var(--card1),var(--card2));
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset,var(--soft);cursor:pointer;transition:.15s}
.tbtn.on{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent));
  box-shadow:0 0 14px color-mix(in srgb,var(--accent) 55%,transparent)}
.steps{display:grid;grid-template-columns:repeat(8,1fr);gap:7px}
.step{aspect-ratio:1/1.25;border-radius:7px;border:none;cursor:pointer;position:relative;
  background:linear-gradient(180deg,var(--card1),var(--card2));
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset,var(--soft);transition:transform .08s}
.step::after{content:"";position:absolute;left:50%;top:6px;width:9px;height:9px;border-radius:50%;
  transform:translateX(-50%);background:rgba(0,0,0,.5)}
.app[data-theme="bone"] .step::after{background:rgba(120,100,60,.3)}
.step.on::after{background:var(--accent-dim)}
.step.cur{transform:scale(.92)}
.step.cur::after{background:var(--accent);box-shadow:0 0 10px 3px color-mix(in srgb,var(--accent) 85%,transparent)}
.step .n{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-family:'DM Mono',monospace;
  font-size:8px;color:var(--ink-dim)}
/* E4.3 Active-Step skip: separate UI state from onSteps; engine drops both
   playback and recording for !actStep[i] (proven in offline_test T21). */
.step.skip{opacity:.32}
.step.skip .n{color:var(--ink-dim)}
.seg{display:inline-flex;border-radius:8px;overflow:hidden;box-shadow:var(--soft)}
.seg .tbtn{border-radius:0;padding:9px 11px;box-shadow:0 1px 0 rgba(255,255,255,.06) inset}
/* E5 FLUX disabled state for step grid + lane: visually inert, click-inert. */
.fluxoff{opacity:.32;pointer-events:none;filter:saturate(.4)}
.mhead{display:flex;justify-content:space-between;align-items:center;margin:16px 0 9px}
.mhead .mt{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--ink-dim)}
.mhead .mt b{color:var(--accent)}
.mbtn{font-family:'Chakra Petch';font-size:9px;font-weight:700;letter-spacing:1px;border:none;
  border-radius:7px;padding:7px 11px;color:var(--ink-dim);cursor:pointer;
  background:linear-gradient(180deg,var(--card1),var(--card2));box-shadow:var(--soft)}
.mbtn.on{color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent))}
.lane{display:grid;grid-template-columns:repeat(16,1fr);gap:3px;height:62px;
  background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.15));border-radius:9px;
  padding:7px 6px;touch-action:none}
.app[data-theme="bone"] .lane{background:linear-gradient(180deg,rgba(140,120,80,.22),rgba(140,120,80,.1))}
.mb{align-self:end;border-radius:2px;background:var(--accent-dim);min-height:2px;transition:height .04s}
.mb.cur{background:var(--accent);box-shadow:0 0 8px color-mix(in srgb,var(--accent) 80%,transparent)}

/* ===== KEYBOARD (always visible at the bottom of the flex column) ======== */
.kbd{position:relative;width:100%;height:116px;display:flex;
  z-index:60;background:#000;box-shadow:0 -8px 22px -10px #000;
  padding-bottom: env(safe-area-inset-bottom);
}
.wk{flex:1;background:linear-gradient(180deg,var(--keyw1),var(--keyw2));border-right:1px solid #2a2a28;
  position:relative;cursor:pointer;transition:.06s}
.wk:last-child{border-right:none}
.wk.dn{background:linear-gradient(180deg,var(--accent2),var(--accent));
  box-shadow:0 0 26px color-mix(in srgb,var(--accent) 60%,transparent) inset}
.bk{position:absolute;top:0;width:9%;height:60%;z-index:2;cursor:pointer;
  background:linear-gradient(180deg,#26272d,#0c0d11);border-radius:0 0 4px 4px;
  box-shadow:0 4px 6px -2px #000,0 0 0 1px #000;transition:.06s}
.bk.dn{background:linear-gradient(180deg,var(--accent),var(--accent-dim));
  box-shadow:0 0 18px color-mix(in srgb,var(--accent) 70%,transparent)}
.kbtn{display:none}

/* U3 — octave-shift indicator. Lives in the .kbd corner; appears only when
   the oct knob is non-zero (updated by emitKnob). Pure visual; no engine call. */
.octind{position:absolute;top:5px;right:10px;z-index:5;pointer-events:none;
  font-family:'Chakra Petch',ui-monospace,monospace;font-size:10px;font-weight:700;
  letter-spacing:1.6px;color:var(--accent);
  text-shadow:0 0 10px color-mix(in srgb,var(--accent) 55%,transparent);
  background:rgba(0,0,0,.42);padding:3px 7px;border-radius:5px;
  border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  display:none}

/* ===== MOBILE LANDSCAPE (small viewport, ~iPhone/Android landscape) =======
   U2/U4: limit the historical "fill the screen" rule to viewports below the
   tablet break (1024). U4 adds grid-template-areas so the section order is
   layout-driven, not DOM-driven (DOM still goes vco/osc/vcf/eg/lfo/dly/seq).
   2-col layout: 4 short sections paired, then the eg/lfo "tall pair", seq. */
@media (orientation:landscape) and (max-width:1023px){
  .app{max-width:100%}
  .scroll{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
    /* EXT-ARP UI sprint: arp row above seq on 2-col viewports (mobile-LS,
       tablet-PT). User-confirmed: arp visually above seq, full-width row. */
    grid-template-areas:
      "vco osc"
      "vcf dly"
      "eg  lfo"
      "arp arp"
      "seq seq";
    align-items:start;padding:0 14px 16px;}
  .sec{margin-bottom:0}
  .sec.full{grid-area:seq}                              /* legacy fallback */
  .disp{margin:0 14px 12px}
  .kbd{max-width:100%;height:128px}
}

/* ===== TABLET PORTRAIT (iPad mini portrait and up, narrow tablets) ========
   U4: same 2-col area-template as mobile landscape — visual consistency
   across "2-col viewports". Sequencer compacted (see .sec-seq overrides). */
@media (min-width:720px) and (orientation:portrait){
  .app{max-width:760px;
    /* U6 — lift off the pure-black body. Shadow + 1px highlight outline,
       both theme-aware via --app-shadow / --app-edge (dark = cold, bone
       = warm). */
    box-shadow:0 24px 60px -20px rgba(var(--app-shadow),.7),
               0 0 0 1px var(--app-edge);
    border-radius:18px}
  .scroll{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;
    /* EXT-ARP UI sprint: arp row above seq. */
    grid-template-areas:
      "vco osc"
      "vcf dly"
      "eg  lfo"
      "arp arp"
      "seq seq";
    align-items:start;padding:0 18px 18px;}
  .sec{margin-bottom:0}
  .sec.full{grid-area:seq}
  .disp{margin:0 18px 14px}
  .kbd{height:140px}
}

/* ===== TABLET LANDSCAPE + DESKTOP (1024–1599) =============================
   U4: 3-col layout. Row 1 = 3 short knob sections (VCO/OSC/VCF, identical
   height). Row 2 = the EG/LFO "tall pair" plus DELAY (DELAY is short, but
   row 2 stretches to the tall pair, so DELAY has extra padding — that's
   the visual symmetry trade-off; the alternative is splitting eg/lfo across
   rows, which the user explicitly does NOT want). */
@media (min-width:1024px){
  .app{max-width:1200px;
    box-shadow:0 32px 80px -22px rgba(var(--app-shadow),.78),
               0 0 0 1px var(--app-edge);
    border-radius:22px}
  /* EXT-ARP UI sprint: 3-col base couldn't host a 50/50 arp+seq split, so
     switch to 6-col where every section spans 2 cols. Visually identical to
     the old 3-col (each section still gets 33% width), but the new arp+seq
     row can be "arp arp arp seq seq seq" = 50/50, as the user requested. */
  .scroll{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;
    grid-template-areas:
      "vco vco osc osc vcf vcf"
      "eg  eg  lfo lfo dly dly"
      "arp arp arp seq seq seq";
    /* align-items: stretch so the row that pairs the tall (eg/lfo) with the
       short (dly) levels out — DELAY gets extra padding inside its card,
       which reads as intentional "breathing room" not a sizing bug. */
    align-items:stretch;padding:0 22px 20px;}
  .sec{margin-bottom:0;display:flex;flex-direction:column}
  .sec.full{grid-area:seq}
  .disp{margin:0 22px 16px}
  .kbd{height:152px}
}

/* ===== DESKTOP WIDE (≥1600) ===============================================
   U4: 4-col layout. Row 1 = all four short sections side-by-side (perfect
   row, all same height). Row 2 = the EG/LFO tall pair, each spanning two
   columns so they don't look squished beside the bigger short row. */
@media (min-width:1600px){
  /* Slight expansion from 1480 → 1560 so the 4-col knobs breathe on big
     monitors without going to "comically large" territory. */
  .app{max-width:1560px;
    box-shadow:0 40px 100px -24px rgba(var(--app-shadow),.82),
               0 0 0 1px var(--app-edge)}
  .scroll{grid-template-columns:repeat(4,1fr);padding:0 28px 24px;gap:18px;
    /* EXT-ARP UI sprint: 4-col splits arp+seq cleanly 50/50. */
    grid-template-areas:
      "vco osc vcf dly"
      "eg  eg  lfo lfo"
      "arp arp seq seq";}
  .kbd{height:164px}
}

/* ===== U4 STEP-SEQUENCER COMPACTION (tablet+ only — mobile portrait keeps
   the touch-friendly 8×2 grid). At wider viewports we get a real 16×1
   "Volca-style" single line of steps with a thinner motion lane underneath. */
@media (min-width:720px){
  .sec-seq .steps{grid-template-columns:repeat(16,1fr);gap:5px}
  .sec-seq .step{aspect-ratio:1/1.35;border-radius:5px}
  .sec-seq .step::after{top:5px;width:7px;height:7px}
  .sec-seq .step .n{font-size:7px;bottom:3px}
  .sec-seq .lane{height:42px;gap:2px}
  .sec-seq .mhead{margin:11px 0 7px}
  .sec-seq .seqhead{margin-bottom:8px}
}
@media (min-width:1024px){
  .sec-seq .lane{height:48px}
}
@media (min-width:1600px){
  .sec-seq .lane{height:56px}
}

/* ===== SMALL SCREENS (height < 720) — tighten knob cells, keep 3-col grid ===*/
@media (max-height: 720px){
  .dial{width:52px;height:52px}
  .ind{top:6px;height:11px;transform-origin:50% 20px}
  .cap{inset:8px}
  .knob label{font-size:8px}
  .grid3{gap:8px}
  .sec{padding:10px 12px 12px;margin-bottom:10px}
  .slot{height:96px}
}

/* ===== SPLASH (first user gesture) ======================================= */
.splash{position:fixed;inset:0;z-index:1000;background:rgba(6,6,8,.94);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
  flex-direction:column;gap:14px;font-family:'Chakra Petch';
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.splash.hidden{display:none}
.splash .logo2{font-size:26px;font-weight:700;letter-spacing:6px;color:#cdd0d9}
.splash .logo2 b{color:#ff6a18;text-shadow:0 0 16px rgba(255,106,24,.6)}
.splash .splashGo{background:linear-gradient(180deg,#ff8a3d,#ff6a18);
  color:#fff;border:0;font-family:'Chakra Petch';font-size:16px;font-weight:700;
  letter-spacing:2.5px;padding:18px 36px;border-radius:12px;cursor:pointer;
  box-shadow:0 8px 30px rgba(255,106,24,.45)}
.splash .splashGo:disabled{background:#23242b;color:#7d8090;box-shadow:none;cursor:wait}
.splash .splashTip{font-size:11px;color:#7d8090;letter-spacing:1.5px}
.splash .splashErr{font-family:'DM Mono',monospace;font-size:11px;color:#ff8a3d;
  max-width:80%;text-align:center;padding-top:10px;display:none}
.splash.error .splashErr{display:block}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="logo2">PARA<b>·</b>3</div>
  <button class="splashGo" id="splashGo">▶ TAP TO START</button>
  <div class="splashTip">Audio benötigt eine User-Geste</div>
  <div class="splashErr" id="splashErr"></div>
</div>

<div class="app" id="app" data-theme="obsidian">

  <div class="bar">
    <div class="logo">PARA<b>·</b>3</div>
    <div class="themes" id="themes">
      <button class="on" data-t="obsidian">OBSIDIAN</button>
      <button data-t="bone">BONE</button>
    </div>
  </div>

  <div class="patch" id="patch"><button class="psave" id="psave">SAVE</button></div>

  <div class="disp">
    <div class="dRow"><span class="dParam" id="dP">READY</span><span class="dParam">PARAPHONIC · 3 VCO</span></div>
    <div style="z-index:1;position:relative"><span class="dVal" id="dV">—</span><span class="dUnit" id="dU"></span></div>
    <canvas id="scope" height="40"></canvas>
  </div>

  <div class="scroll">
    <div class="sec sec-vco" style="grid-area:vco"><h2>VCO · <b>VOICE</b></h2>
      <div class="vgrid" id="voice">
        <button class="on">Poly</button><button>Unison</button><button>Octave</button>
        <button>Fifth</button><button>Uni Ring</button><button>Poly Ring</button></div></div>

    <div class="sec sec-osc" style="grid-area:osc"><h2>OSC · <b>TUNE</b></h2><div class="grid3">
      <div class="knob" data-min="-2" data-max="2" data-val="0" data-unit="oct" data-name="OCTAVE" data-k="oct"></div>
      <div class="knob" data-min="0" data-max="100" data-val="22" data-unit="" data-name="DETUNE" data-k="det"></div>
      <div class="knob" data-min="0" data-max="100" data-val="0" data-unit="" data-name="PORTAMENTO" data-k="por"></div></div></div>

    <div class="sec sec-vcf" style="grid-area:vcf"><h2>V<b>CF</b></h2><div class="grid3">
      <div class="knob" data-min="0" data-max="100" data-val="64" data-unit="" data-name="CUTOFF" data-k="cut"></div>
      <div class="knob" data-min="0" data-max="100" data-val="35" data-unit="" data-name="PEAK" data-k="pk"></div>
      <div class="knob" data-min="-100" data-max="100" data-val="20" data-unit="" data-name="EG INT" data-k="egi"></div></div></div>

    <div class="sec sec-eg" style="grid-area:eg"><h2>E<b>G</b></h2><div class="fwrap" id="faders">
      <div class="fader" data-val="14" data-name="ATTACK" data-k="atk"><div class="slot"><div class="sfill"></div><div class="grip"></div></div><label>Atk</label></div>
      <div class="fader" data-val="55" data-name="DECAY/REL" data-k="dec"><div class="slot"><div class="sfill"></div><div class="grip"></div></div><label>Dec</label></div>
      <div class="fader" data-val="70" data-name="SUSTAIN" data-k="sus"><div class="slot"><div class="sfill"></div><div class="grip"></div></div><label>Sus</label></div></div></div>

    <div class="sec sec-lfo" style="grid-area:lfo"><h2>L<b>FO</b></h2><div class="grid3">
      <div class="knob" data-min="0" data-max="100" data-val="30" data-unit="" data-name="LFO RATE" data-k="lrt"></div>
      <div class="knob" data-min="0" data-max="100" data-val="0" data-unit="" data-name="PITCH INT" data-k="lpi"></div>
      <div class="knob" data-min="0" data-max="100" data-val="40" data-unit="" data-name="CUTOFF INT" data-k="lci"></div></div>
      <div class="wave" id="wave">
        <button class="on"><svg viewBox="0 0 24 15"><polyline points="1,14 6,1 12,14 18,1 23,14"/></svg></button>
        <button><svg viewBox="0 0 24 15"><polyline points="1,14 11,1 11,14 23,1"/></svg></button>
        <button><svg viewBox="0 0 24 15"><polyline points="1,14 1,1 12,1 12,14 23,14 23,1"/></svg></button>
        <span class="lled" id="lled"></span>
        <!-- E1.2 LFO Trigger Sync: same .wave button look, separate id so the
             shape-selector handler (querySelectorAll inside #wave) only ever
             sees the three shape buttons via the explicit lsync.contains-check. -->
        <button id="lsync" title="LFO TRIGGER SYNC (E1.2 KORG-parity)" style="width:auto;padding:0 10px;font:600 11px/1 ui-sans-serif,system-ui;letter-spacing:.06em">SYNC</button></div></div>

    <div class="sec sec-dly" style="grid-area:dly"><h2>DELAY · <b>MASTER</b></h2>
      <div class="grid3" style="grid-template-columns:repeat(4,1fr)">
      <div class="knob" data-min="0" data-max="100" data-val="38" data-unit="" data-name="DLY TIME" data-k="dt"></div>
      <div class="knob" data-min="0" data-max="100" data-val="46" data-unit="" data-name="FEEDBACK" data-k="df"></div>
      <div class="knob" data-min="0" data-max="100" data-val="78" data-unit="" data-name="VOLUME" data-k="vol"></div>
      <div class="knob" data-min="50" data-max="240" data-val="120" data-unit="BPM" data-name="TEMPO" data-k="tmp"></div></div></div>

    <!-- EXT-ARP: design extension over Volca-Keys parity. Default off → engine
         bit-identical to pre-EXT (proven by T31a). Header style mirrors the
         other sections. NOT in KNOB_PARAM — arp settings have their own
         emit paths (no taper trichter).
         UI2 (industry-standard layout): two LED toggles (ON / HOLD), four
         knobs (MODE / RATE / OCT / GATE). Discrete knobs use data-int="1"
         so they snap to integer detents. Matches Volca FM's TYPE/RANGE
         knob convention. No tooltips — disp/show() handles feedback. -->
    <div class="sec sec-arp" style="grid-area:arp"><div class="seqhead"><h2>ARP · <b>EXT</b></h2>
      <div class="tg"><button class="tbtn" id="arpOn">ON</button><button class="tbtn" id="arpHold">HOLD</button></div></div>
      <div class="grid3" style="grid-template-columns:repeat(4,1fr)">
        <div class="knob" data-min="0" data-max="4"   data-val="0"  data-unit=""  data-name="MODE" data-k="arpMode" data-int="1"></div>
        <div class="knob" data-min="0" data-max="5"   data-val="3"  data-unit=""  data-name="RATE" data-k="arpRate" data-int="1"></div>
        <div class="knob" data-min="1" data-max="4"   data-val="1"  data-unit="×" data-name="OCT"  data-k="arpOct"  data-int="1"></div>
        <div class="knob" data-min="0" data-max="100" data-val="50" data-unit="%" data-name="GATE" data-k="arpGate"></div>
      </div>
    </div>

    <div class="sec full sec-seq" style="grid-area:seq"><div class="seqhead"><h2>STEP <b>SEQ</b> · 16</h2>
      <div class="tg"><button class="tbtn" id="play">▶</button><button class="tbtn" id="clr">CLR</button></div></div>
      <!-- E4 KORG-parity sequencer behaviours; engine T19–T22.
           E5 FLUX-Modus: separate mode (no step grid, event-based). -->
      <div style="display:flex;justify-content:flex-end;gap:7px;margin-bottom:9px;flex-wrap:wrap">
        <button class="tbtn" id="stp"   title="STEP TRIGGER · EG retrigger every step">STP</button>
        <button class="tbtn" id="astep" title="ACTIVE-STEP MODE · click steps to skip">ACT</button>
        <button class="tbtn" id="metro" title="METRONOME · delay bypassed engine-side">METRO</button>
        <span class="seg" id="tdiv">
          <button class="tbtn on" data-d="1">1/1</button>
          <button class="tbtn"    data-d="2">1/2</button>
          <button class="tbtn"    data-d="4">1/4</button>
        </span>
        <button class="tbtn" id="flux"   title="FLUX MODE · sample-accurate event sequence">FLUX</button>
        <button class="tbtn" id="flxrec" title="FLUX REC · arm event capture (engine T23)">F·REC</button>
      </div>
      <div class="steps" id="steps"></div>
      <div class="mhead"><span class="mt">MOTION → <b id="mTgt">CUTOFF</b></span>
        <button class="mbtn" id="mSmooth" title="SMOOTH (E3 KORG-parity)">SMOOTH</button>
        <button class="mbtn" id="mArm">MOTION REC</button></div>
      <div class="lane" id="lane"></div></div>
  </div>

  <button class="kbtn" id="kbtn">⌨ KEYS</button>
  <div class="kbd" id="kbd"><div class="octind" id="octind"></div></div>
</div>

<script type="module">
import { Para3Audio, PARAM, MODE, LFO_SHAPE } from './para3-audio.js';

// =============================================================================
//  PARA-3 :: responsive UI bind  (CLAUDE_INTEGRATE_UI.md + CLAUDE_SCOPE_AND_LAYOUT.md)
//
//  Visual logic is the original design. Audio bindings added at every UI hook
//  so EVERY user input goes through ONE funnel:
//     UI → Para3Controls → ring → worklet dispatch → engine C-API
//  Scope is read-only metering off an AnalyserNode wired AFTER the worklet:
//     workletNode → analyser → destination
//  The synthetic `lfo()` animator is gone. Silence ⇒ flat. Real signal only.
// =============================================================================

if ('serviceWorker' in navigator) {
  addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((e) =>
      console.warn('sw register failed', e));
  });
}

const audio = new Para3Audio();
let analyser   = null;            // AnalyserNode, set after audio.start()
let scopeBuf   = null;            // Float32Array(fftSize) — analyser output
// E6.1: host-side masterGain is GONE; VOLUME goes through the engine via
// PARAM.VOLUME so master-gain matches the rest of the funnel (smoothed,
// bit-identical at unity per offline_test T24).
let ready      = false;
function emit(fn) { if (ready) try { fn(audio.controls); } catch (e) { console.warn(e); } }

(function(){
  const app=document.getElementById('app');
  const dP=document.getElementById('dP'),dV=document.getElementById('dV'),dU=document.getElementById('dU');
  function show(n,v,u){dP.textContent=n;
    dV.textContent=(typeof v==='number'?(Number.isInteger(v)?v:v.toFixed(1)):v);dU.textContent=u||'';}

  const themes=document.getElementById('themes');
  themes.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    [...themes.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');
    app.dataset.theme=b.dataset.t;});

  // ---- knob-id → engine PARAM (only ids with a real engine path) ----------
  // U5: vol is now a regular PARAM entry (engine spec: PARA3_P_VOLUME=15 is
  // motion-fähig). Pulling vol into KNOB_PARAM makes isMotionCapable() see it
  // without a special branch — one funnel for everything that is a normalised
  // PARAM.* write.
  const KNOB_PARAM = {
    cut: PARAM.CUTOFF,
    pk:  PARAM.RESONANCE,
    lrt: PARAM.LFO_RATE,
    lpi: PARAM.LFO_PITCH_DEPTH,
    lci: PARAM.LFO_CUT_DEPTH,
    dt:  PARAM.DELAY_TIME,
    df:  PARAM.DELAY_FEEDBACK,
    // E1.1 KORG-parity. Bipolar in the engine taper: norm=(val-min)/(max-min)
    // maps val=0 -> 0.5 -> bip=0 (no swing) for an egi range of -100..+100.
    egi: PARAM.EG_CUT_DEPTH,
    // E2 KORG-parity: unipolar through the existing RampParam smoother (no
    // zipper), value=0 is the bit-identical no-op baseline (Engine T16/T17).
    det: PARAM.DETUNE,
    por: PARAM.PORTAMENTO,
    // E6.1 / U5: VOLUME is just a PARAM. The host masterGain was removed in
    // E6, so this is the only path — and it makes vol a valid motion target.
    vol: PARAM.VOLUME,
  };
  // tmp -> seqTempo(BPM)        (NOT setParam — bpm, not a normalised param)
  // oct -> setOctave(int) via the engine (E6.2; replaces midiOfKey +oct*12)
  // INERT_KNOBS is kept as the doc anchor; after E1+E2+E6 it is empty. If any
  // entry ever returns here, the UI WILL render it greyed (see .inert class)
  // — there is no "wired but silent" state in this UI.
  const INERT_KNOBS = new Set();

  function emitKnob(id, val, min, max) {
    const n = (val - min) / (max - min);
    if (id in KNOB_PARAM) emit((c) => c.setParam(KNOB_PARAM[id], n));
    else if (id === 'tmp') emit((c) => c.seqTempo(val));
    else if (id === 'oct') {
      const o = Math.round(val);
      emit((c) => c.setOctave(o));                                      // E6.2
      updateOctIndicator(o);                                            // U3 display-only
    }
    // EXT-ARP UI: all arp params are controller settings (not KNOB_PARAM →
    // no setParamNorm taper). UI2: MODE/RATE/OCT/GATE are now knobs.
    // Discrete knobs use data-int="1" so the val is already rounded; we
    // also override disp/show with friendly names instead of the raw int.
    else if (id === 'arpMode') {
      const m = Math.round(val);
      show('ARP MODE', arpModeNames[m] || '?', '');
      emit((c) => c.arpMode(m));
    }
    else if (id === 'arpRate') {
      const r = Math.round(val);
      show('ARP RATE', arpRateNames[r] || '?', '');
      emit((c) => c.arpRate(r));
    }
    else if (id === 'arpOct') {
      const o = Math.round(val);
      show('ARP OCT', '×' + o, '');
      emit((c) => c.arpOctaves(o));
    }
    else if (id === 'arpGate') {
      show('ARP GATE', Math.round(val), '%');
      emit((c) => c.arpGate(val / 100));
    }
  }

  // U3 — small visual indicator in the keyboard corner when oct knob != 0.
  // Pure visual. No engine call, no transport message, no extra OP code.
  // Cache the DOM lookup once.
  const _octindEl = document.getElementById('octind');
  function updateOctIndicator(oct) {
    if (!_octindEl) return;                               // (only null if HTML structure changes)
    if (oct === 0) { _octindEl.style.display = 'none'; return; }
    _octindEl.style.display = '';
    _octindEl.textContent = (oct > 0 ? '+' : '') + oct + ' OCT';
  }

  // U3 — MIDI -> human note name with octave (MIDI 60 = C4 convention).
  // Returns 'OOR' for values outside the standard 0..127 range so the user
  // sees that the engine will clamp (we still emit noteOn; engine handles).
  const _NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function midiToName(midi) {
    if (midi < 0 || midi > 127) return 'OOR';
    // midi is now in [0, 127], so midi % 12 is safely in [0, 11].
    return _NOTE_NAMES[midi % 12] + (Math.floor(midi / 12) - 1);
  }

  const C=2*Math.PI*25,SW=0.75,K={};
  const KT=`<div class="dial"><svg viewBox="0 0 60 60"><circle class="trk" cx="30" cy="30" r="25"/><circle class="flx" cx="30" cy="30" r="25"/></svg><div class="cap"></div><div class="ind"></div></div>`;
  document.querySelectorAll('.knob').forEach(k=>{
    k.insertAdjacentHTML('afterbegin',KT);
    k.insertAdjacentHTML('beforeend','<label>'+k.dataset.name.replace('PORTAMENTO','PORTA')+'</label>');
    const min=+k.dataset.min,max=+k.dataset.max,unit=k.dataset.unit,name=k.dataset.name,id=k.dataset.k;
    let val=+k.dataset.val;
    if (INERT_KNOBS.has(id)) k.classList.add('inert');
    const fl=k.querySelector('.flx'),ind=k.querySelector('.ind'),dial=k.querySelector('.dial');
    fl.style.strokeDasharray=(C*SW)+' '+C;
    // EXT-ARP-UI2: integer-step opt-in via data-int="1". Previous logic
    // auto-detected stepInt from |min|<=2 && |max|<=2 (covers OCTAVE knob),
    // but discrete ARP knobs (MODE 0..4, RATE 0..5, OCT 1..4) need the
    // same snap-to-integer behaviour without inflating the auto-detect
    // range and changing other knobs. data-int="1" is additive: any future
    // discrete-stepped knob can opt in the same way.
    const stepInt=(k.dataset.int==='1')||(Math.abs(min)<=2&&Math.abs(max)<=2);
    function R(){const f=(val-min)/(max-min);fl.style.strokeDashoffset=C*SW*(1-f);
      ind.style.transform='translateX(-50%) rotate('+(-135+f*270)+'deg)';}
    R();
    K[id]={get:()=>val,
           set:v=>{val=Math.max(min,Math.min(max,v));R();emitKnob(id,val,min,max);},
           name,unit,min,max,el:k};
    let dg=false,sy=0,sv=0;
    dial.addEventListener('pointerdown',e=>{if(motionArm){setTarget(id);return;}
      dg=true;sy=e.clientY;sv=val;dial.setPointerCapture(e.pointerId);show(name,d(val),unit);});
    dial.addEventListener('pointermove',e=>{if(!dg)return;
      const sp=max-min,dd=(sy-e.clientY)/180*sp;val=Math.max(min,Math.min(max,sv+dd));
      if(stepInt)val=Math.round(val);R();show(name,d(val),unit);
      emitKnob(id,val,min,max);});
    const up=()=>dg=false;dial.addEventListener('pointerup',up);dial.addEventListener('pointercancel',up);
    function d(v){return stepInt?v:Math.round(v);}
  });

  // ---- faders → engine ATTACK / DECREL / SUSTAIN --------------------------
  const FADER_PARAM = {
    atk: PARAM.ATTACK,
    dec: PARAM.DECREL,
    sus: PARAM.SUSTAIN,
  };
  function emitFader(id, val) {
    if (id in FADER_PARAM) emit((c) => c.setParam(FADER_PARAM[id], val / 100));
  }
  const F={};
  document.querySelectorAll('.fader').forEach(f=>{
    let val=+f.dataset.val;const name=f.dataset.name,id=f.dataset.k;
    const fill=f.querySelector('.sfill'),grip=f.querySelector('.grip'),slot=f.querySelector('.slot');
    function R(){const H=slot.clientHeight-18,y=9+(H*(1-val/100));
      fill.style.height=(slot.clientHeight-9-y)+'px';grip.style.bottom=(slot.clientHeight-y-10)+'px';}
    R();
    // U5: F entries carry name/el so the motion-target system (setTarget,
    // .tgt visualisation, motionByTgt lane lookup) treats them like knobs.
    F[id]={get:()=>val,set:v=>{val=Math.max(0,Math.min(100,v));R();emitFader(id,val);},
           name,el:f};
    let dg=false;
    function S(e){const r=slot.getBoundingClientRect();
      val=Math.max(0,Math.min(100,(1-(e.clientY-r.top-9)/(r.height-18))*100));R();
      show(name,Math.round(val),'');emitFader(id,val);}
    slot.addEventListener('pointerdown',e=>{
      // U5: under motion-arm a slot tap picks the fader as the target lane
      // (mirrors the knob dial.pointerdown behaviour). All three fader ids
      // (atk/dec/sus) are motion-fähig per engine spec (ATTACK/DECREL/SUSTAIN).
      if (motionArm) { setTarget(id); return; }
      dg=true;slot.setPointerCapture(e.pointerId);S(e);
    });
    slot.addEventListener('pointermove',e=>{if(dg)S(e);});
    slot.addEventListener('pointerup',()=>dg=false);slot.addEventListener('pointercancel',()=>dg=false);
  });

  // ---- voice mode (poly/unison/octave/fifth/uniring/polyring) -------------
  const VOICE_MODE = [MODE.POLY, MODE.UNISON, MODE.OCTAVE, MODE.FIFTH,
                     MODE.UNIRING, MODE.POLYRING];
  const voice=document.getElementById('voice');let voiceIx=0;
  voice.addEventListener('click',e=>{if(e.target.tagName!=='BUTTON')return;
    [...voice.children].forEach(b=>b.classList.remove('on'));e.target.classList.add('on');
    voiceIx=[...voice.children].indexOf(e.target);
    show('VOICE',e.target.textContent.toUpperCase(),'');
    emit((c) => c.setMode(VOICE_MODE[voiceIx]));});

  // ---- LFO shape: 3 buttons in this UI = TRIANGLE / SAW / SQUARE ----------
  const LFO_FROM_LW = [LFO_SHAPE.TRIANGLE, LFO_SHAPE.SAW, LFO_SHAPE.SQUARE];
  const wave=document.getElementById('wave');let lw=0;
  // The 3 shape buttons are the FIRST 3 buttons in #wave; SYNC (id=lsync) sits
  // next to them visually but is filtered out below so it never participates in
  // the shape-selector state.
  const waveShapes = [...wave.querySelectorAll('button')].filter(b => b.id !== 'lsync');
  wave.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    if (b.id === 'lsync') return;             // E1.2 separate handler below
    waveShapes.forEach(x=>x.classList.remove('on'));b.classList.add('on');
    lw=waveShapes.indexOf(b);
    show('LFO WAVE',['TRIANGLE','SAW','SQUARE'][lw],'');
    emit((c) => c.setLfoShape(LFO_FROM_LW[lw]));});

  // ---- E1.2 LFO Trigger Sync (toggle) -------------------------------------
  const lsync=document.getElementById('lsync');let lfoSync=false;
  lsync.onclick=()=>{lfoSync=!lfoSync;lsync.classList.toggle('on',lfoSync);
    show('LFO SYNC',lfoSync?'ON':'OFF','');
    emit((c) => c.setLfoSync(lfoSync));};

  // ---- sequencer ----------------------------------------------------------
  // Step note: last played MIDI note from the keyboard, fallback C3 (48).
  let lastNote = 48;
  // E3 KORG-parity. Motion is target-parametric: one lane per motion-capable
  // PARAM. motionByTgt is the UI-local mirror; the engine has the authoritative
  // double-buffered copy and publishes atomically on seqCommit (T13-safe).
  // PEAK/TEMPO are not motion-capable — setTarget rejects them; the engine
  // additionally counts rejects via para3_seq_motion_rejects (proven in T18).
  const motionByTgt = {};
  const newLane = () => new Array(16).fill(50);
  function laneFor(id) {
    if (!motionByTgt[id]) motionByTgt[id] = newLane();
    return motionByTgt[id];
  }
  // U5: any control that writes a normalised PARAM.* through the funnel can
  // be a motion target (knobs in KNOB_PARAM, faders in FADER_PARAM). PEAK
  // (RESONANCE) is the only PARA3_P_* the engine refuses; 'oct' and 'tmp'
  // aren't even normalised params (setOctave / seqTempo), so they cannot
  // be motion targets at all.
  function motionParamId(id) {
    if (id in KNOB_PARAM)  return KNOB_PARAM[id];
    if (id in FADER_PARAM) return FADER_PARAM[id];
    return undefined;
  }
  function motionEntry(id) { return K[id] || F[id]; }     // {name, el, …}
  function motionTargets() { return [...Object.values(K), ...Object.values(F)]; }
  function isMotionCapable(id) {
    const pid = motionParamId(id);
    return pid !== undefined && pid !== PARAM.RESONANCE;
  }

  function flushPattern() {
    // E5: step-grid pattern flush is suppressed in FLUX mode (the step grid
    // is not the playback model there; engine's fluxBank drives note events).
    if (fluxOn) return;
    emit((c) => {
      // Notes/gates only; E3 removes the legacy "motion_on + motionCut" path
      // (the inline cutoff-implicit lane). All motion goes through the
      // target-parametric seqMotion stream below.
      for (let i = 0; i < 16; i++) c.seqStep(i, lastNote, onSteps[i], false, 0);
      c.seqLength(16);
      // Re-flush every stored lane via seqMotion; the engine keeps lanes
      // independent and seqCommit publishes them atomically together.
      for (const id of Object.keys(motionByTgt)) {
        if (!isMotionCapable(id)) continue;            // mirror engine reject
        const pid = motionParamId(id), lane = motionByTgt[id];
        for (let i = 0; i < 16; i++) c.seqMotion(pid, i, lane[i] / 100);
      }
      c.seqCommit();
    });
  }
  const stepsEl=document.getElementById('steps');
  const onSteps=new Array(16).fill(false);[0,3,6,7,10,12].forEach(i=>onSteps[i]=true);
  // E4.3 — separate state from onSteps (spec §E4.3, must NOT overload onSteps).
  // actStep[i]=false means the engine skips this step entirely (no note, no
  // motion application, but the sequencer still counts past it).
  const actStep=new Array(16).fill(true);
  let astepMode=false;
  for(let i=0;i<16;i++){const b=document.createElement('button');
    b.className='step'+(onSteps[i]?' on':'');b.innerHTML='<span class="n">'+(i+1)+'</span>';
    b.onclick=()=>{
      if (astepMode) {
        // E4.3: in active-step mode the grid edits the skip state.
        actStep[i]=!actStep[i];
        b.classList.toggle('skip', !actStep[i]);
        emit((c) => c.seqActiveStep(i, actStep[i]));
      } else {
        // default: gate-on/off (existing semantics, preserved).
        onSteps[i]=!onSteps[i];
        b.classList.toggle('on', onSteps[i]);
        flushPattern();
      }
    };
    stepsEl.appendChild(b);}
  const sN=[...stepsEl.children];let playing=false,cur=-1,seqT=0;
  // B4 + EXT-ARP-FIX3: visual-cursor mirrors engine state EXACTLY by tracking
  // the same two quantities the engine clock uses: an integer step + a
  // fractional "samples-into-step" accumulator. On tdiv changes the engine
  // keeps its acc and re-interprets it under the new dur — so a previously-
  // 40%-complete step at div=2 becomes 80%-complete at div=1 (acc=4800 in a
  // 12000-sample step → 4800 in a 6000-sample step). FIX2 used only an
  // integer step and dropped the fractional carry, making the engine fire
  // ahead of the cursor by exactly that fraction (user-reported "klang
  // eine Note zu früh dran").
  let cursorStep      = 0;     // integer step index
  let cursorAccSec    = 0;     // seconds into current step (fractional)
  let cursorRegimeTs  = 0;     // audio.ctx.currentTime at last regime change
  const playB=document.getElementById('play');
  playB.onclick=()=>{playing=!playing;playB.classList.toggle('on',playing);
    playB.textContent=playing?'■':'▶';
    if(!playing&&cur>=0){sN[cur].classList.remove('cur');laneB[cur].classList.remove('cur');cur=-1;}
    if (playing) {
      cursorStep     = 0;                                                  // Volca Play=restart-from-0
      cursorAccSec   = 0;
      cursorRegimeTs = audio.ctx ? audio.ctx.currentTime : 0;
    }
    emit((c) => playing ? c.seqStart() : c.seqStop());};
  document.getElementById('clr').onclick=()=>{onSteps.fill(false);
    sN.forEach(n=>n.classList.remove('on'));flushPattern();};

  const laneEl=document.getElementById('lane');
  for(let i=0;i<16;i++){const d=document.createElement('div');d.className='mb';laneEl.appendChild(d);}
  const laneB=[...laneEl.children];
  function drawLane(){const lane=laneFor(tgtId);laneB.forEach((b,i)=>b.style.height=lane[i]+'%');}
  let mdrag=false;
  function paint(e){
    if (!isMotionCapable(tgtId)) return;            // hard reject mirrors engine
    const lane=laneFor(tgtId), pid=motionParamId(tgtId);
    const r=laneEl.getBoundingClientRect();
    let i=Math.max(0,Math.min(15,Math.floor((e.clientX-r.left)/r.width*16)));
    let v=Math.max(0,Math.min(100,(1-(e.clientY-r.top-7)/(r.height-14))*100));
    lane[i]=v;laneB[i].style.height=v+'%';show('MOTION '+tgtName,Math.round(v),'');
    emit((c) => { c.seqMotion(pid, i, v / 100); c.seqCommit(); });
  }
  laneEl.addEventListener('pointerdown',e=>{mdrag=true;laneEl.setPointerCapture(e.pointerId);paint(e);});
  laneEl.addEventListener('pointermove',e=>{if(mdrag)paint(e);});
  laneEl.addEventListener('pointerup',()=>mdrag=false);laneEl.addEventListener('pointercancel',()=>mdrag=false);

  // E3 — tgtId state lives BEFORE the first drawLane() call (the function
  // reads tgtId from the closure; calling it before initialisation is TDZ).
  let motionArm=false,tgtId='cut',tgtName='CUTOFF';
  drawLane();
  const mArm=document.getElementById('mArm'),mTgt=document.getElementById('mTgt');
  mArm.onclick=()=>{
    // Per E3 spec line 80–83: #mArm is a GLOBAL arm indicator only. The engine
    // owns per-param auto-shutdown after one loop (no UI back-channel). We arm
    // the *current* target's REC; switching tgt mid-record does NOT disarm.
    if (!isMotionCapable(tgtId)) {
      show('MOTION REC', tgtName, '— Ziel nicht motion-faehig');
      return;
    }
    motionArm=!motionArm;mArm.classList.toggle('on',motionArm);
    motionTargets().forEach(o=>o.el.classList.remove('tgt'));
    if(motionArm) motionEntry(tgtId).el.classList.add('tgt');
    emit((c) => c.seqMotionRec(motionParamId(tgtId), motionArm));
  };

  // E3 SMOOTH toggle (global per-pattern).
  const mSmooth=document.getElementById('mSmooth');let motionSmooth=false;
  mSmooth.onclick=()=>{motionSmooth=!motionSmooth;mSmooth.classList.toggle('on',motionSmooth);
    show('MOTION SMOOTH',motionSmooth?'ON':'OFF','');
    emit((c) => c.seqMotionSmooth(motionSmooth));};

  // ---- E4 sequencer behaviours ---------------------------------------------
  const stpB=document.getElementById('stp');let stepTrig=false;
  stpB.onclick=()=>{stepTrig=!stepTrig;stpB.classList.toggle('on',stepTrig);
    show('STEP TRIGGER',stepTrig?'ON':'OFF','');
    emit((c) => c.seqStepTrigger(stepTrig));};

  // E4.3 — active-step *mode* is a UI mode (which state the grid edits).
  // The engine just receives per-step seqActiveStep events on grid clicks.
  const astepB=document.getElementById('astep');
  astepB.onclick=()=>{astepMode=!astepMode;astepB.classList.toggle('on',astepMode);
    // Re-render the step grid in the active mode: highlight 'skip' state when on,
    // 'gate-on' state when off. Both states are preserved independently.
    sN.forEach((b,i)=>{
      b.classList.toggle('on',  !astepMode && onSteps[i]);
      b.classList.toggle('skip', astepMode && !actStep[i]);
    });
    show('STEP MODE', astepMode ? 'ACTIVE-STEP (skip edit)' : 'GATE', '');
  };

  const metroB=document.getElementById('metro');let metroOn=false;
  metroB.onclick=()=>{metroOn=!metroOn;metroB.classList.toggle('on',metroOn);
    show('METRONOME',metroOn?'ON (delay bypassed)':'OFF','');
    emit((c) => c.seqMetronome(metroOn));};

  // E4.2 — tempo division as a 3-way radio group (1/1, 1/2, 1/4 — engine T20).
  const tdiv=document.getElementById('tdiv');let tdivVal=1;
  tdiv.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    const d=+b.dataset.d; if (d!==1 && d!==2 && d!==4) return;   // engine clamps
    // EXT-ARP-FIX3: re-anchor the cursor BEFORE switching tdivVal. Mirror
    // exactly what the engine does — keep the fractional acc, recompute
    // step index. Mathematically: total seconds in old regime = elapsed +
    // previous acc; steps fired = floor(total/smOld); leftover = total
    // mod smOld; that leftover carries into the new regime as the new
    // cursorAccSec. Without this fold, the cursor lost the fractional
    // position and trailed the engine by exactly that fraction.
    if (playing && audio.ctx) {
      const bpm = K.tmp.get();
      const smOld = (60 / (bpm * 4)) * tdivVal;
      const tNow  = audio.ctx.currentTime;
      const total = cursorAccSec + (tNow - cursorRegimeTs);
      const stepsFired = Math.floor(total / smOld);
      cursorStep      = (cursorStep + stepsFired) | 0;
      cursorAccSec    = total - stepsFired * smOld;     // fractional carry
      cursorRegimeTs  = tNow;
    }
    tdivVal=d;[...tdiv.querySelectorAll('button')].forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    show('TEMPO DIV','1/'+d,'');
    emit((c) => c.seqTempoDiv(d));});

  // ---- E5 FLUX mode --------------------------------------------------------
  // Switching the mode is click-free engine-side (running notes continue via
  // the shared gate logic). UI only flips: visual state of #steps + #lane and
  // suppresses flushPattern while flux is on. NO new step-logic — the step
  // grid is the wrong model for flux (events-driven, not slot-driven).
  const fluxB=document.getElementById('flux');let fluxOn=false;
  const flxRecB=document.getElementById('flxrec');let fluxRecOn=false;
  function fluxLoopLenSamples() {
    // 1 bar (4 beats) at current tempo, audio.ctx.sampleRate if available.
    const bpm = (K.tmp && K.tmp.get) ? K.tmp.get() : 120;
    const sr  = (audio && audio.ctx) ? audio.ctx.sampleRate : 48000;
    return Math.max(1, Math.round((60.0 / bpm) * 4.0 * sr));
  }
  fluxB.onclick=()=>{fluxOn=!fluxOn;fluxB.classList.toggle('on',fluxOn);
    show('FLUX', fluxOn ? 'ON (event sequence)' : 'OFF (step grid)', '');
    stepsEl.classList.toggle('fluxoff', fluxOn);
    laneEl.classList.toggle('fluxoff', fluxOn);
    if (fluxOn) emit((c) => { c.seqFluxLoopLen(fluxLoopLenSamples()); c.seqFluxMode(true); });
    else        emit((c) => c.seqFluxMode(false));
  };
  flxRecB.onclick=()=>{fluxRecOn=!fluxRecOn;flxRecB.classList.toggle('on',fluxRecOn);
    show('FLUX REC', fluxRecOn ? 'ARMED' : 'OFF', '');
    if (!fluxRecOn) emit((c) => { c.seqFluxRec(false); c.seqFluxCommit(); });
    else            emit((c) => c.seqFluxRec(true));
  };

  // EXT-ARP UI2: only ON / HOLD are toggles. MODE / RATE / OCT / GATE are
  // knobs (data-int="1" for the discrete ones). Industry-standard layout:
  // the rotary controls match every other section of the synth; the two
  // LEDs are the only stateful buttons. State is read from K.arpMode etc.
  // on demand (knob loop populates them).
  const arpOnB   = document.getElementById('arpOn');
  const arpHoldB = document.getElementById('arpHold');
  let arpOnState = false, arpHoldState = false;
  const arpModeNames = ['UP','DN','UP+DN','AS-PLAYED','RANDOM'];
  const arpRateNames = ['1/4','1/8','1/8T','1/16','1/16T','1/32'];

  arpOnB.onclick = () => {
    arpOnState = !arpOnState;
    arpOnB.classList.toggle('on', arpOnState);
    // EXT-ARP-FIX4: ARP and the sequencer transport are independent surfaces
    // (industry-standard HW behaviour). Toggling ARP does NOT touch Play —
    // ARP runs on its own tempo-derived clock as soon as arpEnabled_=true.
    show('ARP', arpOnState ? 'ON' : 'OFF',
         arpOnState ? arpModeNames[Math.round(K.arpMode.get())] : '');
    emit((c) => c.arpEnable(arpOnState));
  };
  arpHoldB.onclick = () => {
    arpHoldState = !arpHoldState;
    arpHoldB.classList.toggle('on', arpHoldState);
    show('ARP HOLD', arpHoldState ? 'LATCH' : 'OFF', '');
    emit((c) => c.arpHold(arpHoldState));
  };

  function setTarget(id){
    // Engine rejects PEAK; UI mirrors that hard, not silently (spec §E3.4).
    // OCT/TMP also rejected here — they're not normalised PARAMs.
    if (!isMotionCapable(id)) {
      const e = motionEntry(id);
      show('MOTION TARGET', e ? e.name : id.toUpperCase(), '— nicht motion-faehig');
      return;
    }
    const e = motionEntry(id);
    tgtId=id; tgtName=e.name; mTgt.textContent=tgtName;
    motionTargets().forEach(o=>o.el.classList.remove('tgt'));
    if (motionArm) e.el.classList.add('tgt');         // ring only while armed
    drawLane();                                       // switch lane visual
    show('MOTION TARGET',tgtName,'');
  }

  // ---- patch save/recall (UI-local snapshot; recall re-emits via .set) ----
  const patch=document.getElementById('patch'),psave=document.getElementById('psave');
  const slots={},NS=8;let saveArm=false;
  for(let i=1;i<=NS;i++){const b=document.createElement('button');b.className='pslot';
    b.textContent='P'+i;b.dataset.s=i;
    b.onclick=()=>{const s=i;
      if(saveArm){slots[s]=snap();b.classList.add('filled');saveArm=false;
        psave.classList.remove('arm');mark(s);show('PATCH','SAVED P'+s,'');}

  const pE=[...patch.querySelectorAll('.pslot')];
  function mark(s){pE.forEach(e=>e.classList.toggle('active',+e.dataset.s===s));}
  psave.onclick=()=>{saveArm=!saveArm;psave.classList.toggle('arm',saveArm);
    show('PATCH',saveArm?'PICK SLOT…':'READY','');};
  function snap(){return{k:Object.fromEntries(Object.entries(K).map(([i,o])=>[i,o.get()])),
    f:Object.fromEntries(Object.entries(F).map(([i,o])=>[i,o.get()])),
    v:voiceIx,w:lw,st:[...onSteps],
    // E3: motion is per-target (motionByTgt). Old single-array 'mo' is gone.
    mo:Object.fromEntries(Object.entries(motionByTgt).map(([i,a])=>[i,[...a]])),
    tg:tgtId};}
  function restore(p){Object.entries(p.k).forEach(([i,v])=>K[i]&&K[i].set(v));
    Object.entries(p.f).forEach(([i,v])=>F[i]&&F[i].set(v));
    [...voice.children].forEach((b,i)=>b.classList.toggle('on',i===p.v));voiceIx=p.v;
    emit((c) => c.setMode(VOICE_MODE[voiceIx]));
    [...wave.querySelectorAll('button')].forEach((b,i)=>b.classList.toggle('on',i===p.w));lw=p.w;
    emit((c) => c.setLfoShape(LFO_FROM_LW[lw]));
    p.st.forEach((on,i)=>{onSteps[i]=on;sN[i].classList.toggle('on',on);});
    // E3 restore: rebuild per-target lanes. Backwards-compat: an array under
    // p.mo (legacy single-lane format) is treated as the CUTOFF lane only.
    Object.keys(motionByTgt).forEach(k=>delete motionByTgt[k]);
    if (Array.isArray(p.mo))      motionByTgt.cut = [...p.mo];
    else if (p.mo && typeof p.mo === 'object')
      Object.entries(p.mo).forEach(([i,a])=>{motionByTgt[i]=[...a];});
    if (p.tg && isMotionCapable(p.tg)) setTarget(p.tg);
    drawLane();flushPattern();}

  // ---- keyboard with collapsible drawer (portrait + landscape) ------------
  //
  // U1 KORG-parity-UI: multi-octave keyboard. The keyboard renders N octaves
  // where N is derived from the viewport (industry-standard ranges, see
  // detectOctaves). Semantics of midiOfKey are unchanged for N=1; the math is
  // generalised to "global white index -> BASE_C + floor(idx/7)*12 + W_PER_OCT[idx%7]".
  // No engine/bridge change — the JS API still sees noteOn(midi).
  const W_PER_OCT = [0, 2, 4, 5, 7, 9, 11];               // semitone offsets within an octave (white keys)
  const B_PER_OCT = { 'C#':1, 'D#':3, 'F#':6, 'G#':8, 'A#':10 };
  const BASE_C    = 48;
  const W_NAMES_OCT  = ['C','D','E','F','G','A','B'];
  const B_NAMES_OCT  = ['C#','D#','F#','G#','A#'];        // 5 black keys per octave
  const B_AFTER_W    = [0, 1, 3, 4, 5];                    // each sits AFTER white at this in-octave index

  function midiOfKey(el) {
    // E6.2: octave shift is engine-side (setOctave). Do NOT add oct*12 here,
    // otherwise we'd double-shift.
    if (el.classList.contains('wk')) {
      const idx = [...kbd.querySelectorAll('.wk')].indexOf(el);
      const oct = Math.floor(idx / 7);
      const pos = idx % 7;
      return BASE_C + oct * 12 + W_PER_OCT[pos];
    }
    if (el.classList.contains('bk')) {
      const oct = parseInt(el.dataset.oct || '0', 10);
      return BASE_C + oct * 12 + (B_PER_OCT[el.dataset.n] || 0);
    }
    return -1;
  }

  const kbd=document.getElementById('kbd'),kbtn=document.getElementById('kbtn');

  // U1: industry-standard viewport bands. Single source of truth for both the
  // JS keyboard-render decision and the ui_test verification grep. Aligned
  // with the CSS app-width breakpoints in U2 (no JS/CSS drift). Each row is
  // {minWidth, octaves, why} so the intent travels with the number.
  const KBD_BREAKPOINTS = Object.freeze([
    { minWidth: 1680, octaves: 5, why: 'desktop wide (27+ inch)' },
    { minWidth: 1280, octaves: 4, why: 'desktop' },
    { minWidth: 1024, octaves: 3, why: 'tablet landscape / small desktop' },
    { minWidth:  720, octaves: 2, why: 'tablet portrait / large mobile landscape (matches CSS tablet-portrait media-query)' },
    { minWidth:    0, octaves: 1, why: 'phone portrait — no U1 regression' },
  ]);
  function detectOctaves(width = window.innerWidth) {
    for (const b of KBD_BREAKPOINTS) if (width >= b.minWidth) return b.octaves;
    return 1;                                              // unreachable; last row matches 0
  }

  // Piano black-key visual width relative to a white key. Real acoustic
  // pianos use ~58%; the existing PARA-3 CSS used 9%/12.5% = 0.72 for the
  // 1-octave keyboard. We preserve that geometry so the keys look identical
  // to the pre-U1 layout when N=1.
  const BLACK_WHITE_VISUAL_RATIO = 9 / 12.5;

  // Pointer-id -> held key map. Declared HERE (before renderKeyboard) so the
  // first render can reference it safely; `typeof` on a TDZ const throws.
  const held = new Map();

  function renderKeyboard(N) {
    // Release any held keys before destroying their elements (logic unchanged
    // — uses the existing emit/noteOff path, just preempts a dangling .dn).
    for (const [, h] of held) emit((c) => c.noteOff(h.note));
    held.clear();
    // Remove only piano keys; the #octind label (added by U3) is a sibling
    // child of .kbd that must survive re-renders.
    kbd.querySelectorAll('.wk, .bk').forEach(n => n.remove());
    kbd.dataset.octaves = String(N);
    const totalWhites = 7 * N + 1;
    const W = 100 / totalWhites;                          // white-key width in %
    const Bw = W * BLACK_WHITE_VISUAL_RATIO;              // black-key width in %
    // Whites: N octaves of 7 whites + one closing C.
    for (let m = 0; m < N; m++) {
      for (let i = 0; i < 7; i++) {
        const w = document.createElement('div');
        w.className = 'wk';
        w.dataset.n = W_NAMES_OCT[i];
        w.dataset.oct = String(m);
        kbd.appendChild(w);
      }
    }
    const wEnd = document.createElement('div');
    wEnd.className = 'wk';
    wEnd.dataset.n = 'C';
    wEnd.dataset.oct = String(N);                          // closing C is the start of next octave
    kbd.appendChild(wEnd);
    // Blacks: 5 per octave, positioned absolute with computed left+width so
    // the white-key flex:1 distribution stays the layout authority.
    for (let m = 0; m < N; m++) {
      for (let k = 0; k < B_NAMES_OCT.length; k++) {
        const i = B_AFTER_W[k];
        const b = document.createElement('div');
        b.className = 'bk';
        b.dataset.n = B_NAMES_OCT[k];
        b.dataset.oct = String(m);
        const globalIdx = 7 * m + i;
        const leftPct = (globalIdx + 1) * W - Bw / 2;
        b.style.left  = leftPct + '%';
        b.style.width = Bw + '%';
        kbd.appendChild(b);
      }
    }
  }

  let currentOctaves = detectOctaves();
  renderKeyboard(currentOctaves);

  // Re-render on viewport changes (resize + rotation). Debounced so that
  // resize-drag in dev tools doesn't thrash. ResizeObserver on document.body
  // catches PWA-window changes that don't fire 'resize' in some browsers.
  let _kbResizeTimer = 0;
  function maybeRerenderKeyboard() {
    const want = detectOctaves();
    if (want !== currentOctaves) {
      currentOctaves = want;
      renderKeyboard(want);
    }
  }
  window.addEventListener('resize', () => {
    clearTimeout(_kbResizeTimer);
    _kbResizeTimer = setTimeout(maybeRerenderKeyboard, 80);
  });
  if ('ResizeObserver' in window) {
    try { new ResizeObserver(maybeRerenderKeyboard).observe(document.body); }
    catch (_) { /* old browser; resize handler is the fallback */ }
  }

  function keyDown(t, pid) {
    if (!t || !(t.classList.contains('wk') || t.classList.contains('bk'))) return;
    if (held.has(pid)) return;
    const note = midiOfKey(t); if (note < 0) return;
    t.classList.add('dn');
    // U3: show the SOUNDING note (incl. engine octave shift) so the user can
    // tell which absolute pitch the engine will play. note=raw keyboard MIDI;
    // engine adds +12*round(oct) internally. OOR-MIDI marked as "OOR".
    show('NOTE', midiToName(note + 12 * Math.round(K.oct.get())), '');
    lastNote = note; held.set(pid, { el: t, note });
    emit((c) => c.noteOn(note));
    // E5: when FLUX mode is on AND REC armed, append event at the engine's
    // live cursor. Engine also guards on fluxRec_, so this is doubly safe.
    if (fluxOn && fluxRecOn) emit((c) => c.seqFluxNote(note, true));
  }
  function keyUp(pid) {
    const h = held.get(pid); if (!h) return;
    h.el.classList.remove('dn'); held.delete(pid);
    emit((c) => c.noteOff(h.note));
    if (fluxOn && fluxRecOn) emit((c) => c.seqFluxNote(h.note, false));
  }
  kbd.addEventListener('pointerdown', (e) => {
    // Tapping the closed grip opens the drawer instead of triggering a note.
    if (!kbd.classList.contains('open')) { setKbOpen(true); return; }
    try { kbd.setPointerCapture(e.pointerId); } catch (_) {}
    keyDown(e.target, e.pointerId);
  });
  kbd.addEventListener('pointermove', (e) => {
    if (!held.has(e.pointerId)) return;
    const t = document.elementFromPoint(e.clientX, e.clientY);
    const h = held.get(e.pointerId);
    if (t && t !== h.el && (t.classList.contains('wk') || t.classList.contains('bk'))) {
      keyUp(e.pointerId); keyDown(t, e.pointerId);
    }
  });
  const releaseKey = (e) => keyUp(e.pointerId);
  kbd.addEventListener('pointerup',     releaseKey);
  kbd.addEventListener('pointercancel', releaseKey);
  kbd.addEventListener('lostpointercapture', releaseKey);

  // drawer toggle: keeps --kbH in sync so .scroll padding clears the drawer
  function isLandscape(){
    return window.matchMedia('(orientation:landscape)').matches;
  }
  function setKbOpen(open){
    kbd.classList.toggle('open', open);
    const h = open ? (isLandscape() ? 128 : 116)
                   : (isLandscape() ? 0   : 40);
    app.style.setProperty('--kbH', h + 'px');
    kbtn.textContent = open ? '⌨ HIDE' : '⌨ KEYS';
  }
  kbtn.onclick = () => setKbOpen(!kbd.classList.contains('open'));
  // Keyboard is always visible now (it lives in the flex column); the .open
  // class is set on init so the keyDown path in pointerdown is not gated.
  setKbOpen(true);
  window.addEventListener('orientationchange',
    () => setKbOpen(kbd.classList.contains('open')));

  // ---- splash / first user gesture ---------------------------------------
  const splash    = document.getElementById('splash');
  const splashGo  = document.getElementById('splashGo');
  const splashErr = document.getElementById('splashErr');
  function pushInitialState() {
    Object.values(K).forEach((o) => emitKnob(o.el.dataset.k, o.get(), o.min, o.max));
    Object.entries(F).forEach(([id, o]) => emitFader(id, o.get()));
    emit((c) => c.setMode(VOICE_MODE[voiceIx]));
    emit((c) => c.setLfoShape(LFO_FROM_LW[lw]));
    emit((c) => c.seqTempo(K.tmp.get()));
    // EXT-ARP UI2: the four arp knobs (mode/rate/oct/gate) are already
    // emitted by the K loop above. Only the two toggles (hold/enable)
    // and an explicit final enable need a manual emit (arpEnable last
    // so the engine starts in the user-visible state).
    emit((c) => { c.arpHold(arpHoldState); c.arpEnable(arpOnState); });
    flushPattern();
  }
  async function start() {
    if (ready) return;
    splashGo.disabled = true;
    splashGo.textContent = 'starting…';
    try {
      await audio.start({ wasmUrl: './para3.wasm' });
      await audio.resume();

      // Real scope source: AnalyserNode wired AFTER the worklet, BEFORE
      // destination. The analyser passes the audio through unchanged and
      // exposes the SAME samples the engine wrote (scope_source_test proves
      // these samples carry the real signal). No second audio path, no
      // duplicate render — the analyser is read-only metering.
      const ctx = audio.ctx;
      analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0;
      scopeBuf = new Float32Array(analyser.fftSize);

      // E6.1: VOLUME lives in the engine now (PARAM.VOLUME). The audio graph
      // is therefore worklet -> read-only analyser -> destination, no host
      // gain node in the way. At unity (vol=100 -> n=1) the engine output is
      // bit-identical to the pre-E6 graph at masterGain=1 (offline_test T24).
      audio.node.disconnect();
      audio.node.connect(analyser).connect(ctx.destination);

      ready = true;
      pushInitialState();
      splash.classList.add('hidden');
      show('READY', 'PLAY', '');

      // Optional in-app proof (Nachweis B). Run on demand: ?selftest=1
      if (new URLSearchParams(location.search).get('selftest') === '1') {
        scopeSelftest();
      }
    } catch (e) {
      splashGo.disabled = false;
      splashGo.textContent = '↻ RETRY';
      splash.classList.add('error');
      splashErr.textContent = (e && e.message) || String(e);
      console.error(e);
    }
  }
  splashGo.addEventListener('click', start);

  // iOS / Android resume on every plausible recovery point.
  function maybeResume() {
    if (!ready || !audio.ctx) return;
    const s = audio.ctx.state;
    if (s === 'suspended' || s === 'interrupted') audio.resume().catch(() => {});
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') maybeResume();
  });
  addEventListener('focus',    maybeResume);
  addEventListener('pageshow', maybeResume);

  // ===========================================================================
  //  SCOPE — paints REAL time-domain samples from the analyser. No autogain.
  //  Silence ⇒ buf ≈ 0 ⇒ a flat line at the centre. Y range fixed to [-1, +1].
  // ===========================================================================
  const cv=document.getElementById('scope'),cx=cv.getContext('2d');
  function sizeCv(){cv.width=cv.clientWidth||400;}sizeCv();
  window.addEventListener('resize',sizeCv);
  window.addEventListener('orientationchange',()=>setTimeout(sizeCv,300));
  const lled=document.getElementById('lled');

  function frame(){
    const w=cv.width,h=cv.height,mid=h/2;
    cx.clearRect(0,0,w,h);

    if (ready && analyser) {
      analyser.getFloatTimeDomainData(scopeBuf);
      const N = scopeBuf.length;
      cx.strokeStyle='rgba(255,150,70,.9)';
      cx.lineWidth=1.5;
      cx.shadowColor='rgba(255,150,70,.55)';
      cx.shadowBlur=6;
      cx.beginPath();
      // map: x in [0,w], y = mid - sample * (h/2). Clip to ±1 (no auto-gain).
      for (let x = 0; x < w; x++) {
        const idx = ((x * (N - 1)) / (w - 1)) | 0;
        let s = scopeBuf[idx];
        if (s > 1) s = 1; else if (s < -1) s = -1;
        const y = mid - s * (h * 0.45);
        x ? cx.lineTo(x, y) : cx.moveTo(x, y);
      }
      cx.stroke();
      cx.shadowBlur=0;

      // crude RMS-driven LED pulse (real audio, not synthetic LFO)
      let sum = 0;
      for (let i = 0; i < N; i++) sum += scopeBuf[i] * scopeBuf[i];
      const rms = Math.sqrt(sum / N);
      const lv = Math.min(1, rms * 4);
      const acc=getComputedStyle(app).getPropertyValue('--accent').trim();
      lled.style.background=`color-mix(in srgb, ${acc} ${18+lv*82}%, transparent)`;
      lled.style.boxShadow=`0 0 ${2+lv*10}px ${lv*3}px color-mix(in srgb,${acc} ${lv*80}%,transparent)`;
    } else {
      // pre-start: draw a static flat baseline (honest — no signal yet).
      cx.strokeStyle='rgba(120,80,50,.35)';
      cx.lineWidth=1;
      cx.beginPath(); cx.moveTo(0, mid); cx.lineTo(w, mid); cx.stroke();
    }

    // sequencer visual cursor (UI-soft estimate; engine drives the audio)
    if (playing) {
      // B3/B4/EXT-ARP-FIX3 honoured. Formula mirrors engine clock state
      // (acc + step). The cursorAccSec is the fractional carry from the
      // last regime change; together with elapsed-since-regime / sm, it
      // produces the SAME integer step the engine will be on.
      const bpm = K.tmp.get(), sm = (60 / (bpm * 4)) * tdivVal;
      const t = audio.ctx ? audio.ctx.currentTime : 0;
      const total = cursorAccSec + Math.max(0, t - cursorRegimeTs);
      const stepsAdvanced = Math.floor(total / sm);
      const c = (((cursorStep + stepsAdvanced) % 16) + 16) % 16;
      if (c !== cur) {
        if (cur >= 0) { sN[cur].classList.remove('cur'); laneB[cur].classList.remove('cur'); }
        cur = c; sN[cur].classList.add('cur'); laneB[cur].classList.add('cur');
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ===========================================================================
  //  SCOPE SELFTEST (Nachweis B — CLAUDE_SCOPE_AND_LAYOUT.md)
  //
  //  A pure animation cannot pass both halves of this test simultaneously:
  //     1) NoteOn(69) ⇒ dominant frequency ≈ 440 Hz  (cannot fake under our
  //        time-domain autocorrelation while ALSO being flat at rest)
  //     2) NoteOff ⇒ RMS < 1e-3                       (a fake would still wiggle)
  //  Result: SCOPE SELFTEST: PASS|FAIL in the JS console.
  // ===========================================================================
  function dominantHzAutocorr(buf, sr) {
    // remove DC
    let mean = 0; for (let i = 0; i < buf.length; i++) mean += buf[i];
    mean /= buf.length;
    const x = new Float32Array(buf.length);
    for (let i = 0; i < buf.length; i++) x[i] = buf[i] - mean;
    // search lag in the human audio range (50 .. 1500 Hz)
    const minLag = Math.floor(sr / 1500);
    const maxLag = Math.floor(sr / 50);
    let bestLag = -1, bestVal = 0;
    for (let lag = minLag; lag <= maxLag; lag++) {
      let s = 0;
      for (let i = 0; i < x.length - lag; i++) s += x[i] * x[i + lag];
      if (s > bestVal) { bestVal = s; bestLag = lag; }
    }
    if (bestLag <= 0) return 0;
    // parabolic interpolation around the peak for sub-sample accuracy
    const c0 = (lag) => {
      let s = 0; for (let i = 0; i < x.length - lag; i++) s += x[i] * x[i + lag];
      return s;
    };
    const y1 = c0(bestLag - 1), y2 = bestVal, y3 = c0(bestLag + 1);
    const denom = (y1 - 2 * y2 + y3);
    const off = denom !== 0 ? 0.5 * (y1 - y3) / denom : 0;
    return sr / (bestLag + off);
  }
  async function scopeSelftest() {
    if (!ready || !analyser) return;
    const sr = audio.ctx.sampleRate;
    try {
      // give the engine a clean, audible context
      emit((c) => c.setParam(PARAM.CUTOFF, 0.85));
      emit((c) => c.setParam(PARAM.RESONANCE, 0.10));
      emit((c) => c.setParam(PARAM.LFO_CUT_DEPTH, 0));
      emit((c) => c.setParam(PARAM.LFO_PITCH_DEPTH, 0));
      emit((c) => c.setParam(PARAM.DELAY_MIX, 0));
      emit((c) => c.setParam(PARAM.ATTACK, 0));
      emit((c) => c.setParam(PARAM.SUSTAIN, 1));
      emit((c) => c.noteOn(69));                        // A4
      await new Promise(r => setTimeout(r, 250));       // past attack + warmup
      const buf = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buf);
      const f0    = dominantHzAutocorr(buf, sr);
      const cents = 1200 * Math.log2(Math.max(f0,1) / 440);
      const passF = Math.abs(cents) <= 5;
      console.log(`SCOPE SELFTEST [A4] f0=${f0.toFixed(3)} Hz  err=${cents.toFixed(2)} cents  -> ${passF ? 'PASS' : 'FAIL'}`);

      emit((c) => c.noteOff(69));
      await new Promise(r => setTimeout(r, 1500));      // past decay/release
      analyser.getFloatTimeDomainData(buf);
      let sum = 0; for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
      const rms = Math.sqrt(sum / buf.length);
      const passR = rms < 1e-3;
      console.log(`SCOPE SELFTEST [silence] rms=${rms.toExponential(3)}  -> ${passR ? 'PASS' : 'FAIL'}`);

      const overall = passF && passR ? 'PASS' : 'FAIL';
      console.log(`SCOPE SELFTEST: ${overall}`);
      show('SELFTEST', overall, '');
    } catch (e) {
      console.error('selftest error', e);
      console.log('SCOPE SELFTEST: FAIL (exception)');
    }
  }
  // Expose for ad-hoc DevTools triggering: window.__para3Selftest()
  window.__para3Selftest = scopeSelftest;

  // -------------------------------------------------------------------------
  //  SCROLL MASK (Variante 2: dynamisch). The .scroll element has a CSS mask
  //  driven by --mtop / --mbot. We map each variable to the *amount* of edge
  //  fade visible (0 = sharp edge, 1 = full 24 px fade). The mask only fades
  //  an edge when there is content to reveal in that direction — it is an
  //  honest affordance signal.
  // -------------------------------------------------------------------------
  const scrollEl = document.querySelector('.scroll');
  function updateScrollMask(){
    if (!scrollEl) return;
    const max = scrollEl.scrollHeight - scrollEl.clientHeight;
    if (max <= 1) {
      scrollEl.style.setProperty('--mtop', '0');
      scrollEl.style.setProperty('--mbot', '0');
      return;
    }
    const top = scrollEl.scrollTop;
    // small ramp (12 px of scroll) reaches full fade — feels responsive.
    const mtop = Math.min(1, Math.max(0, top / 12));
    const mbot = Math.min(1, Math.max(0, (max - top) / 12));
    scrollEl.style.setProperty('--mtop', mtop.toFixed(3));
    scrollEl.style.setProperty('--mbot', mbot.toFixed(3));
  }
  if (scrollEl) {
    scrollEl.addEventListener('scroll', updateScrollMask, { passive: true });
    window.addEventListener('resize', updateScrollMask);
    window.addEventListener('orientationchange',
      () => setTimeout(updateScrollMask, 220));
    // initial paint after layout settles
    requestAnimationFrame(updateScrollMask);
    requestAnimationFrame(updateScrollMask);   // belt + braces for first frame
  }

})();
</script>
</body>
</html>
