<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img"
     aria-label="PARA·3" fill="none">
  <title>PARA·3</title>

  <!-- ===== mark: machined module, three paraphonic voices ===== -->
  <g transform="translate(20 25)">
    <rect x="0" y="0" width="130" height="130" rx="32"
          fill="currentColor" opacity="0.06"/>
    <rect x="1" y="1" width="128" height="128" rx="31"
          stroke="currentColor" stroke-opacity="0.30" stroke-width="2"/>
    <rect x="30" y="36"  width="70" height="15" rx="7.5" fill="#d9622b"/>
    <rect x="30" y="60"  width="54" height="15" rx="7.5"
          fill="currentColor" opacity="0.92"/>
    <rect x="30" y="84"  width="38" height="15" rx="7.5"
          fill="currentColor" opacity="0.55"/>
  </g>

  <!-- ===== wordmark: hand-built heavy monoline (no font dependency) ===== -->
  <g transform="translate(196 30)" stroke="currentColor" stroke-width="28"
