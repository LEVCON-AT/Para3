    <!-- P -->
    <g transform="translate(0 0)">
      <path d="M14 4 L14 116"/>
      <path d="M14 4 H44 A30 30 0 0 1 44 64 H14"/>
    </g>
    <!-- A -->
    <g transform="translate(96 0)">
      <path d="M6 116 L46 4 L86 116"/>
      <path d="M22 78 H70"/>
    </g>
    <!-- R -->
    <g transform="translate(200 0)">
      <path d="M14 4 L14 116"/>
      <path d="M14 4 H44 A30 30 0 0 1 44 64 H14"/>
      <path d="M40 64 L82 116"/>
    </g>
    <!-- A -->
    <g transform="translate(300 0)">
      <path d="M6 116 L46 4 L86 116"/>
      <path d="M22 78 H70"/>
    </g>
    <!-- interpunct — brand signature -->
    <circle cx="416" cy="74" r="15" fill="#d9622b" stroke="none"/>
    <!-- 3 -->
    <g transform="translate(452 0)">
      <path d="M12 28 C 18 8, 46 1, 62 13 C 80 26, 74 54, 50 61
               C 76 67, 82 96, 60 110 C 42 121, 17 115, 9 96"/>
    </g>
